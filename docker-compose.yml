version: "3.8"

services:
  api:
    build: .
    container_name: voice-ai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7
    container_name: voice-ai-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: voice-ai-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: voice_ai
    ports:
      - "5432:5432"